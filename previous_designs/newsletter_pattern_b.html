<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GATE タレントニュース - Pattern B（グラデーション）</title>
</head>

<body
    style="margin: 0; padding: 0; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: 'Hiragino Kaku Gothic Pro', 'Yu Gothic', 'Meiryo', sans-serif;">

    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
        <tr>
            <td align="center" style="padding: 40px 20px;">

                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600"

                    <!-- ヘッダー -->
                    <tr>

                    <!-- タレント1: ベッキー -->
                    <tr>
                        <td style="padding: 35px 40px;">

                                <tr>
                                    <td style="text-align: center; padding-bottom: 20px;">

                                    </td>
                                </tr>
                                <tr>
                                    <td style="text-align: center;">

                                </tr>
                                <tr>
                                    <td>
                                        <table role="presentation" cellpadding="0" cellspacing="0" border="0"
                                            width="100%"
                                            style="background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%); border-radius: 12px;">
                                            <tr>
                                                <td style="padding: 18px 20px;">
                                                    <p
                                                        style="margin: 0 0 5px 0; color: #667eea; font-size: 10px; font-weight: 700;">
                                                        📺 TV出演</p>
                                                    <p
                                                        style="margin: 0; color: #333; font-size: 14px; font-weight: 600;">
                                                        読売テレビ「見取り図の間取り図ミステリー」海外ロケ</p>
                                                </td>
                                            </tr>
                                        </table>
                                        <table role="presentation" cellpadding="0" cellspacing="0" border="0"
                                            width="100%"
                                            style="background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%); border-radius: 12px; margin-top: 10px;">
                                            <tr>
                                                <td style="padding: 18px 20px;">
                                                    <p
                                                        style="margin: 0 0 5px 0; color: #667eea; font-size: 10px; font-weight: 700;">
                                                        🎨 イベント</p>
                                                    <p
                                                        style="margin: 0; color: #333; font-size: 14px; font-weight: 600;">
                                                        Becky art 個展「クリスマスリリース」@ ラフォーレ原宿</p>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- 区切り線 -->
                    <tr>
                        <td style="padding: 0 40px;">
                            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                                <tr>
                                    <td
                                        style="height: 1px; background: linear-gradient(90deg, transparent 0%, #667eea 50%, transparent 100%);">
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- タレント2: ハリセンボン -->
                    <tr>
                        <td style="padding: 35px 40px;">
                            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                                <tr>
                                    <td style="text-align: center; padding-bottom: 20px;">
                                        <img src="images/harisenbon.jpg" alt="ハリセンボン" width="130" height="130"
                                            style="width: 130px; height: 130px; border-radius: 50%; object-fit: cover; border: 4px solid #764ba2; box-shadow: 0 8px 25px rgba(118,75,162,0.3);">

                                </tr>
                                <tr>
                                    <td style="text-align: center;">
                                        <h2 style="margin: 0 0 5px 0; color: #333; font-size: 22px; font-weight: 700;">

                                                        🎉 開催決定！</p>
                                                    <p
                                                        style="margin: 0 0 8px 0; color: #333; font-size: 16px; font-weight: 700;">
                                                        有楽町・笑博 2026</p>
                                                    <p style="margin: 0 0 12px 0; color: #333; font-size: 14px;">「ハリセンボン
                                                        Presents 金のハリセンボン」</p>
                                                    <p style="margin: 0; color: #666; font-size: 12px;">📅 2026.2.27 (金)
                                                        ｜ 📍 有楽町よみうりホール</p>
                                                </td>
                                            </tr>
                                        </table>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- フッター -->
                    <tr>
                        <td
                            style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 25px 40px; text-align: center;">
                            <p
                                style="margin: 0 0 8px 0; color: #fff; font-size: 14px; font-weight: 600; letter-spacing: 2px;">
                                GATE</p>
                            <p style="margin: 0; color: rgba(255,255,255,0.7); font-size: 11px;">info@gate-agency.com
                            </p>

                    </tr>

                </table>
            </td>
        </tr>
