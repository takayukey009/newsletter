<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GATE タレントニュース - Pattern A（ミニマル）</title>
</head>

<body
    style="margin: 0; padding: 0; background-color: #ffffff; font-family: 'Hiragino Kaku Gothic Pro', 'Yu Gothic', 'Meiryo', sans-serif;">

    <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%"
        style="background-color: #ffffff;">
        <tr>
            <td align="center" style="padding: 40px 20px;">

                <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="600"
                    style="max-width: 600px;">

                    <!-- ヘッダー（シンプル） -->
                    <tr>
                        <td style="padding: 20px 0; border-bottom: 2px solid #000;">
                            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                                <tr>
                                    <td>
                                        <h1
                                            style="margin: 0; color: #000; font-size: 32px; font-weight: 300; letter-spacing: 8px;">
                                            GATE</h1>
                                    </td>
                                    <td style="text-align: right;">
                                        <p style="margin: 0; color: #666; font-size: 11px; letter-spacing: 1px;">TALENT
                                            NEWS</p>
                                        <p style="margin: 4px 0 0 0; color: #999; font-size: 10px;">2026.01</p>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- タレント1: ベッキー -->
                    <tr>
                        <td style="padding: 40px 0; border-bottom: 1px solid #eee;">
                            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                                <tr>
                                    <td width="140" style="vertical-align: top;">
                                        <img src="images/becky.jpg" alt="ベッキー" width="120" height="120"
                                            style="width: 120px; height: 120px; object-fit: cover;">
                                    </td>
                                    <td style="vertical-align: top; padding-left: 20px;">
                                        <h2 style="margin: 0 0 8px 0; color: #000; font-size: 20px; font-weight: 600;">
                                            ベッキー</h2>
                                        <p
                                            style="margin: 0 0 15px 0; color: #999; font-size: 10px; letter-spacing: 1px;">
                                            BECKY</p>

                                        <p style="margin: 0 0 8px 0; color: #333; font-size: 13px; line-height: 1.6;">
                                            <span style="color: #999; font-size: 10px;">TV</span><br>
                                            読売テレビ「見取り図の間取り図ミステリー」海外ロケ出演
                                        </p>
                                        <p style="margin: 0; color: #333; font-size: 13px; line-height: 1.6;">
                                            <span style="color: #999; font-size: 10px;">EVENT</span><br>
                                            Becky art 個展「クリスマスリリース」ラフォーレ原宿
                                        </p>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- タレント2: ハリセンボン -->
                    <tr>
                        <td style="padding: 40px 0; border-bottom: 1px solid #eee;">
                            <table role="presentation" cellpadding="0" cellspacing="0" border="0" width="100%">
                                <tr>
                                    <td width="140" style="vertical-align: top;">
                                        <img src="images/harisenbon.jpg" alt="ハリセンボン" width="120" height="120"
                                            style="width: 120px; height: 120px; object-fit: cover;">
                                    </td>
                                    <td style="vertical-align: top; padding-left: 20px;">
                                        <h2 style="margin: 0 0 8px 0; color: #000; font-size: 20px; font-weight: 600;">
                                            ハリセンボン</h2>
                                        <p
                                            style="margin: 0 0 15px 0; color: #999; font-size: 10px; letter-spacing: 1px;">
                                            HARISENBON</p>

                                        <p style="margin: 0 0 12px 0; color: #333; font-size: 13px; line-height: 1.6;">
                                            <span style="color: #999; font-size: 10px;">EVENT</span><br>
                                            有楽町・笑博 2026「ハリセンボン Presents 金のハリセンボン」
                                        </p>
                                        <p style="margin: 0; color: #666; font-size: 12px;">
                                            📅 2026.2.27 (金) ／ 📍 有楽町よみうりホール
                                        </p>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>

                    <!-- フッター -->
                    <tr>
                        <td style="padding: 30px 0; text-align: center;">
                            <p style="margin: 0 0 5px 0; color: #000; font-size: 12px; letter-spacing: 2px;">GATE</p>
                            <p style="margin: 0; color: #999; font-size: 10px;">info@gate-agency.com</p>
                        </td>
                    </tr>

                </table>
            </td>
        </tr>
    </table>

</body>

</html>
